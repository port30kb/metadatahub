# Nordic Rights and Licenses Vocabulary
# ======================================
# ~53 entries covering Creative Commons licenses, RightsStatements.org
# statements, Nordic copyright law concepts, Europeana rights framework,
# and common museum scenario guidance.
#
# Categories:
#   creative-commons       — CC license suite
#   rights-statement       — RightsStatements.org standardized statements
#   nordic-copyright-law   — Nordic country copyright legislation & concepts
#   europeana-framework    — Europeana licensing/rights tiers & policies
#   museum-scenario        — Common museum rights use cases & guidance

# ═══════════════════════════════════════════════════════════════
# Creative Commons Licenses
# ═══════════════════════════════════════════════════════════════

- id: creative-commons
  labels:
    en: Creative Commons
    sv: Creative Commons
    fi: Creative Commons
    da: Creative Commons
    nb: Creative Commons
  category: creative-commons
  canonical_uri: "https://creativecommons.org/"
  description: "Top-level grouping for all Creative Commons license types. Creative Commons provides free, easy-to-use copyright licenses to make a simple and standardized way to give the public permission to share and use creative work."

- id: cc0-1
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/publicdomain/zero/1.0/"
  labels:
    en: CC0 1.0 Universal (Public Domain Dedication)
    sv: CC0 1.0 Universell (Public Domain-dedikation)
    fi: CC0 1.0 Yleismaailmallinen (Tekijänoikeuksista luopuminen)
    da: CC0 1.0 Universel (Frigivelse til det offentlige domæne)
    nb: CC0 1.0 Universell (Fristilling av opphavsrett)
  category: creative-commons
  europeana_tier: "tier-4"
  description: "Waives all copyright and related rights. The creator dedicates the work to the public domain worldwide. Recommended for metadata, catalog records, and factual data where maximum reuse is desired."
  usage_guidance: "Ideal for museum metadata/catalog records, measurement data, and factual descriptions. Cannot be revoked once applied. Note that moral rights (ideell ratt) in Nordic countries cannot be waived."

- id: cc-by-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by/4.0/"
  labels:
    en: Creative Commons Attribution 4.0 International
    sv: Creative Commons Erkannande 4.0 Internationell
    fi: Creative Commons Nimea 4.0 Kansainvalinen
    da: Creative Commons Navngivelse 4.0 International
    nb: Creative Commons Navngivelse 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-4"
  description: "Allows reuse with attribution. Recommended for museum-created metadata, documentation photos, and digitized works where the museum holds all rights."
  usage_guidance: "Use when the museum created the digital reproduction and the original work is in the public domain, or when the museum holds all necessary rights."

- id: cc-by-sa-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by-sa/4.0/"
  labels:
    en: Creative Commons Attribution-ShareAlike 4.0 International
    sv: Creative Commons Erkannande-DelaLika 4.0 Internationell
    fi: Creative Commons Nimea-JaaSamoin 4.0 Kansainvalinen
    da: Creative Commons Navngivelse-DelPaSammeVilkar 4.0 International
    nb: Creative Commons Navngivelse-DelPaSammeVilkar 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-4"
  description: "Allows reuse with attribution, provided derivatives are shared under the same or a compatible license. Ensures that improvements remain openly available."
  usage_guidance: "Good for collaborative projects where the museum wants to ensure derivative works also remain open. Wikipedia/Wikimedia Commons uses this license."

- id: cc-by-nc-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by-nc/4.0/"
  labels:
    en: Creative Commons Attribution-NonCommercial 4.0 International
    sv: Creative Commons Erkannande-IckeKommersiell 4.0 Internationell
    fi: Creative Commons Nimea-EiKaupallinen 4.0 Kansainvalinen
    da: Creative Commons Navngivelse-IkkeKommerciel 4.0 International
    nb: Creative Commons Navngivelse-IkkeKommersiell 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-2"
  description: "Allows reuse with attribution for non-commercial purposes only. Commercial use requires separate permission from the rights holder."
  usage_guidance: "Use when the museum wants to allow educational and personal reuse but restrict commercial exploitation. Note that 'non-commercial' can be ambiguous in practice."

- id: cc-by-nc-sa-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
  labels:
    en: Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International
    sv: Creative Commons Erkannande-IckeKommersiell-DelaLika 4.0 Internationell
    fi: Creative Commons Nimea-EiKaupallinen-JaaSamoin 4.0 Kansainvalinen
    da: Creative Commons Navngivelse-IkkeKommerciel-DelPaSammeVilkar 4.0 International
    nb: Creative Commons Navngivelse-IkkeKommersiell-DelPaSammeVilkar 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-2"
  description: "Allows non-commercial reuse with attribution, provided derivatives are shared under the same or compatible license."
  usage_guidance: "Combines non-commercial restriction with share-alike requirement. Common in educational and cultural heritage contexts."

- id: cc-by-nd-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by-nd/4.0/"
  labels:
    en: Creative Commons Attribution-NoDerivatives 4.0 International
    sv: Creative Commons Erkannande-IngaBearbetningar 4.0 Internationell
    fi: Creative Commons Nimea-EiMuutoksia 4.0 Kansainvalinen
    da: Creative Commons Navngivelse-IngenBearbejdelser 4.0 International
    nb: Creative Commons Navngivelse-IngenBearbeidelser 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-3"
  description: "Allows redistribution with attribution but no derivative works. The work must be shared in its original, unmodified form."
  usage_guidance: "Rarely recommended for cultural heritage data. Use when integrity of the original representation is paramount (e.g., exhibition catalog essays)."

- id: cc-by-nc-nd-4
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/licenses/by-nc-nd/4.0/"
  labels:
    en: Creative Commons Attribution-NonCommercial-NoDerivatives 4.0 International
    sv: Creative Commons Erkannande-IckeKommersiell-IngaBearbetningar 4.0 Internationell
    fi: Creative Commons Nimea-EiKaupallinen-EiMuutoksia 4.0 Kansainvalinen
    da: Creative Commons Navngivelse-IkkeKommerciel-IngenBearbejdelser 4.0 International
    nb: Creative Commons Navngivelse-IkkeKommersiell-IngenBearbeidelser 4.0 Internasjonal
  category: creative-commons
  europeana_tier: "tier-1"
  description: "The most restrictive Creative Commons license. Allows downloading and sharing with attribution, but no commercial use and no modifications."
  usage_guidance: "Most restrictive CC license. Consider whether a more open license or a rights statement would be more appropriate."

- id: pdm-1
  broader: creative-commons
  canonical_uri: "https://creativecommons.org/publicdomain/mark/1.0/"
  labels:
    en: Public Domain Mark 1.0
    sv: Public Domain-marke 1.0
    fi: Public Domain -merkinta 1.0
    da: Public Domain-markering 1.0
    nb: Public Domain-merke 1.0
  category: creative-commons
  europeana_tier: "tier-4"
  description: "Indicates that a work is free of known copyright restrictions worldwide. Not a license but a label indicating public domain status."
  usage_guidance: "Use for works where copyright has expired (typically 70 years after author's death in the EU/EEA). The work itself must be in the public domain; this mark does not place it there."

# ═══════════════════════════════════════════════════════════════
# RightsStatements.org Statements
# ═══════════════════════════════════════════════════════════════

- id: rights-statements
  labels:
    en: RightsStatements.org
    sv: RightsStatements.org
    fi: RightsStatements.org
    da: RightsStatements.org
    nb: RightsStatements.org
  category: rights-statement
  canonical_uri: "https://rightsstatements.org/"
  description: "Top-level grouping for RightsStatements.org standardized rights statements. Provides a set of 12 standardized rights statements for use by cultural heritage institutions to communicate the copyright and reuse status of digital objects."

- id: inc
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/InC/1.0/"
  labels:
    en: In Copyright
    sv: Upphovsrattsskyddat
    fi: Tekijanoikeuden alainen
    da: Ophavsretligt beskyttet
    nb: Opphavsrettsbeskyttet
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The item is in copyright. The rights holder has not given authorization for reuse. Users may only use the item in ways permitted by copyright limitations and exceptions."
  usage_guidance: "Default statement for copyrighted works. Ensure you have verified the copyright status before applying."

- id: inc-ow-eu
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/InC-OW-EU/1.0/"
  labels:
    en: In Copyright - EU Orphan Work
    sv: Upphovsrattsskyddat - EU foraldralost verk
    fi: Tekijanoikeuden alainen - EU orpoteos
    da: Ophavsretligt beskyttet - EU foraldrelost vark
    nb: Opphavsrettsbeskyttet - EU foreldrelost verk
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The item has been identified as an orphan work in the EU. A diligent search for the rights holder has been conducted in accordance with Directive 2012/28/EU."
  usage_guidance: "Requires a documented diligent search conducted according to EU Orphan Works Directive. The search must be recorded in the EUIPO Orphan Works Database."

- id: inc-edu
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/InC-EDU/1.0/"
  labels:
    en: In Copyright - Educational Use Permitted
    sv: Upphovsrattsskyddat - Utbildningsanvandning tilllaten
    fi: Tekijanoikeuden alainen - Opetuskaytto sallittu
    da: Ophavsretligt beskyttet - Undervisningsbrug tilladt
    nb: Opphavsrettsbeskyttet - Undervisningsbruk tillatt
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The item is in copyright, but the rights holder has authorized educational use. Non-educational use requires additional permission."
  usage_guidance: "Use when the rights holder has granted specific permission for educational use. Define 'educational use' clearly in the institution's terms."

- id: inc-nc
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/InC-NC/1.0/"
  labels:
    en: In Copyright - Non-Commercial Use Permitted
    sv: Upphovsrattsskyddat - Icke-kommersiell anvandning tilllaten
    fi: Tekijanoikeuden alainen - Ei-kaupallinen kaytto sallittu
    da: Ophavsretligt beskyttet - Ikke-kommerciel brug tilladt
    nb: Opphavsrettsbeskyttet - Ikke-kommersiell bruk tillatt
  category: rights-statement
  europeana_tier: "tier-2"
  description: "The item is in copyright, but the rights holder has authorized non-commercial use. Commercial use requires additional permission."
  usage_guidance: "Use when the rights holder has explicitly permitted non-commercial reuse. Different from CC-BY-NC in that it does not grant a formal license."

- id: inc-ruu
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/InC-RUU/1.0/"
  labels:
    en: In Copyright - Rights-holder(s) Unlocatable or Unidentifiable
    sv: Upphovsrattsskyddat - Rattighetsinnehavare ej lokaliserbar eller identifierbar
    fi: Tekijanoikeuden alainen - Oikeudenhaltijaa ei loydeta tai tunnisteta
    da: Ophavsretligt beskyttet - Rettighedshaver ikke lokaliserbar eller identificerbar
    nb: Opphavsrettsbeskyttet - Rettighetshaver ikke lokaliserbar eller identifiserbar
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The item is in copyright but the rights holder has not been identified or located after a reasonable investigation. Not an EU orphan work designation."
  usage_guidance: "Use when a search has been conducted but does not meet the EU Orphan Works Directive requirements. Document the search efforts undertaken."

- id: noc-cr
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/NoC-CR/1.0/"
  labels:
    en: No Copyright - Contractual Restrictions
    sv: Ingen upphovsratt - Avtalsmassiga begransningar
    fi: Ei tekijanoikeutta - Sopimusrajoitukset
    da: Ingen ophavsret - Kontraktmaessige begraensninger
    nb: Ingen opphavsrett - Kontraktsmessige begrensninger
  category: rights-statement
  europeana_tier: "tier-3"
  description: "The underlying work is not in copyright but contractual restrictions apply to the digital surrogate. Common when a third party digitized the work under contract."
  usage_guidance: "Use when a digitization partner's contract restricts reuse of the digital copy. The original work remains in the public domain."

- id: noc-oklr
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/NoC-OKLR/1.0/"
  labels:
    en: No Copyright - Other Known Legal Restrictions
    sv: Ingen upphovsratt - Andra kanda rattsliga begransningar
    fi: Ei tekijanoikeutta - Muut tunnetut oikeudelliset rajoitukset
    da: Ingen ophavsret - Andre kendte juridiske begraensninger
    nb: Ingen opphavsrett - Andre kjente rettslige begrensninger
  category: rights-statement
  europeana_tier: "tier-3"
  description: "The work is not in copyright but other legal restrictions prevent free reuse. May include cultural heritage protection laws, privacy laws, or export restrictions."
  usage_guidance: "Use when non-copyright legal restrictions apply, such as cultural heritage protection legislation or privacy regulations (GDPR)."

- id: noc-us
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/NoC-US/1.0/"
  labels:
    en: No Copyright - United States
    sv: Ingen upphovsratt - Forenta Staterna
    fi: Ei tekijanoikeutta - Yhdysvallat
    da: Ingen ophavsret - USA
    nb: Ingen opphavsrett - USA
  category: rights-statement
  europeana_tier: "tier-4"
  description: "The item has been determined to be free of copyright in the United States. This does not necessarily mean it is free of copyright in other jurisdictions."
  usage_guidance: "Primarily relevant for US-based institutions. Nordic museums should generally use Public Domain Mark or country-specific assessments instead."

- id: cne
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/CNE/1.0/"
  labels:
    en: Copyright Not Evaluated
    sv: Upphovsratt ej utvarderats
    fi: Tekijanoikeutta ei arvioitu
    da: Ophavsret ikke vurderet
    nb: Opphavsrett ikke vurdert
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The copyright status of the item has not been evaluated. Users must determine copyright status themselves before reuse."
  usage_guidance: "A temporary status. Institutions should work toward evaluating and assigning a more specific rights statement over time."

- id: und
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/UND/1.0/"
  labels:
    en: Copyright Undetermined
    sv: Upphovsratt obestamd
    fi: Tekijanoikeus maarittelematon
    da: Ophavsret ubestemt
    nb: Opphavsrett ubestemt
  category: rights-statement
  europeana_tier: "tier-1"
  description: "The copyright status has been reviewed but could not be determined. This may be due to incomplete information or complex rights situations."
  usage_guidance: "Use when an evaluation has been attempted but the status remains unclear. Document what information is missing or uncertain."

- id: nkc
  broader: rights-statements
  canonical_uri: "http://rightsstatements.org/vocab/NKC/1.0/"
  labels:
    en: No Known Copyright
    sv: Ingen kand upphovsratt
    fi: Ei tunnettua tekijanoikeutta
    da: Ingen kendt ophavsret
    nb: Ingen kjent opphavsrett
  category: rights-statement
  europeana_tier: "tier-4"
  description: "No copyright holder has been identified for the work. The institution believes the work may be used freely but cannot guarantee there are no copyright claims."
  usage_guidance: "Use when research indicates no copyright applies but absolute certainty cannot be established. More cautious than Public Domain Mark."

# ═══════════════════════════════════════════════════════════════
# Nordic Copyright Law Concepts
# ═══════════════════════════════════════════════════════════════

- id: nordic-copyright
  labels:
    en: Nordic Copyright Law
    sv: Nordisk upphovsratt
    fi: Pohjoismainen tekijanoikeus
    da: Nordisk ophavsret
    nb: Nordisk opphavsrett
  category: nordic-copyright-law
  description: "Top-level grouping for Nordic copyright legislation and legal concepts. The Nordic countries share a common copyright tradition with harmonized but nationally distinct legislation."

- id: se-copyright-act
  broader: nordic-copyright
  canonical_uri: "https://www.riksdagen.se/sv/dokument-och-lagar/dokument/svensk-forfattningssamling/lag-1960729-om-upphovsratt-till-litterara-och_sfs-1960-729/"
  labels:
    en: Swedish Copyright Act (Upphovsrattslagen)
    sv: Upphovsrattslagen (1960:729)
    fi: Ruotsin tekijanoikeuslaki
    da: Svensk ophavsretslov
    nb: Svensk lov om opphavsrett
  category: nordic-copyright-law
  description: "The Swedish Act on Copyright in Literary and Artistic Works (1960:729). Provides comprehensive copyright protection for literary and artistic works, including visual art, photographs, and databases."
  usage_guidance: "Key provisions: Section 44a on photographic images (shorter protection), Section 49 on catalogs/databases, Section 26e on extended collective licensing."

- id: fi-copyright-act
  broader: nordic-copyright
  canonical_uri: "https://www.finlex.fi/fi/laki/ajantasa/1961/19610404"
  labels:
    en: Finnish Copyright Act (Tekijanoikeuslaki)
    sv: Finlands upphovsrattslag
    fi: Tekijanoikeuslaki (404/1961)
    da: Finsk ophavsretslov
    nb: Finsk lov om opphavsrett
  category: nordic-copyright-law
  description: "The Finnish Copyright Act (404/1961). Protects literary and artistic works with specific provisions for photographic works, databases, and cultural heritage institutions."
  usage_guidance: "Key provisions: Section 49a on photographic images, Chapter 2 on limitations and exceptions, extended collective licensing provisions in Section 26."

- id: no-copyright-act
  broader: nordic-copyright
  canonical_uri: "https://lovdata.no/dokument/NL/lov/2018-06-15-40"
  labels:
    en: Norwegian Copyright Act (Andsverkloven)
    sv: Norska upphovsrattslagen
    fi: Norjan tekijanoikeuslaki
    da: Norsk ophavsretslov
    nb: Lov om opphavsrett til andsverk (andsverkloven)
  category: nordic-copyright-law
  description: "The Norwegian Act on Copyright in Literary and Artistic Works (LOV-2018-06-15-40). Modernized in 2018, it covers copyright, neighboring rights, and database protection."
  usage_guidance: "The 2018 act replaced the 1961 law. Chapter 3 covers exceptions and limitations relevant to cultural heritage institutions."

- id: dk-copyright-act
  broader: nordic-copyright
  canonical_uri: "https://www.retsinformation.dk/eli/lta/2014/1144"
  labels:
    en: Danish Copyright Act (Ophavsretsloven)
    sv: Danska upphovsrattslagen
    fi: Tanskan tekijanoikeuslaki
    da: Ophavsretsloven (LBK nr 1144)
    nb: Dansk lov om opphavsrett
  category: nordic-copyright-law
  description: "The Danish Consolidated Act on Copyright (ophavsretsloven). Provides protection for literary and artistic works with provisions for cultural heritage use."
  usage_guidance: "Key provisions: Section 70 on photographic images, Chapter 2 on limitations, extended collective licensing in Section 50."

- id: is-copyright-act
  broader: nordic-copyright
  canonical_uri: "https://www.althingi.is/lagas/nuna/1972073.html"
  labels:
    en: Icelandic Copyright Act (Hofundalog)
    sv: Islandska upphovsrattslagen
    fi: Islannin tekijanoikeuslaki
    da: Islandsk ophavsretslov
    nb: Islandsk lov om opphavsrett
    is: Hofundalog (nr. 73/1972)
  category: nordic-copyright-law
  description: "The Icelandic Copyright Act (No. 73/1972). Provides copyright protection following the Nordic tradition with harmonized rules for literary and artistic works."
  usage_guidance: "Follows the same Nordic copyright tradition as the other Scandinavian countries. EEA membership requires alignment with EU copyright directives."

- id: post-mortem-70
  broader: nordic-copyright
  labels:
    en: 70-Year Post-Mortem Rule
    sv: 70 ar efter upphovsmannens dod
    fi: 70 vuotta tekijan kuoleman jalkeen
    da: 70 ar efter ophavsmandens dod
    nb: 70 ar etter opphavsmannens dod
  category: nordic-copyright-law
  description: "Copyright in the EU/EEA expires 70 years after the death of the author (post mortem auctoris). This term was harmonized by EU Directive 2006/116/EC across all member states."
  usage_guidance: "For works by known authors, copyright expires on January 1st of the year following the 70th anniversary of the author's death. For anonymous/pseudonymous works, 70 years from publication."

- id: freedom-of-panorama
  broader: nordic-copyright
  labels:
    en: Freedom of Panorama
    sv: Panoramafrihet
    fi: Panoraamavapaus
    da: Panoramafrihed
    nb: Panoramafrihet
  category: nordic-copyright-law
  description: "Legal provision allowing photography and reproduction of works permanently situated in public places. Implementation varies significantly across the Nordic countries."
  usage_guidance: "Sweden (Section 24): allows reproduction of outdoor public artworks. Denmark (Section 24): similar provision. Finland (Section 25a): limited to buildings and outdoor sculptures. Norway (Section 31): allows reproduction of outdoor works. Always verify current national legislation."

- id: public-domain-concept
  broader: nordic-copyright
  labels:
    en: Public Domain
    sv: Allmanningen (fri fran upphovsratt)
    fi: Public domain (tekijanoikeudesta vapaa)
    da: Det fri vark (public domain)
    nb: Det fri verket (public domain)
  category: nordic-copyright-law
  description: "Works not protected by copyright, either because protection has expired, been waived, or never existed. In the Nordic context, note that moral rights persist even after economic rights expire."
  usage_guidance: "Mark with Public Domain Mark 1.0 or CC0. Remember that moral rights (attribution and integrity) may still apply under Nordic law even for public domain works."

- id: orphan-works
  broader: nordic-copyright
  labels:
    en: Orphan Works
    sv: Herrelosa verk
    fi: Orpoteokset
    da: Foraldrelose vaerker
    nb: Foreldrelose verk
  category: nordic-copyright-law
  description: "Works still in copyright whose rights holder cannot be identified or located after a diligent search. EU Directive 2012/28/EU provides a framework for use by cultural heritage institutions."
  usage_guidance: "Nordic museums can use orphan works under the EU Directive after conducting and documenting a diligent search. Extended collective licensing (avtalslicens) offers an alternative Nordic approach."

- id: extended-collective-licensing
  broader: nordic-copyright
  labels:
    en: Extended Collective Licensing
    sv: Avtalslicens
    fi: Sopimuslisenssit
    da: Aftalelicens
    nb: Avtalelisens
  category: nordic-copyright-law
  description: "A distinctly Nordic mechanism where agreements between users and representative collecting societies are extended to cover non-member rights holders. Enables mass digitization and online access."
  usage_guidance: "Particularly valuable for mass digitization projects. In Sweden, governed by Section 42a-42j of the Copyright Act. Collecting societies include Bildupphovsratt (images) and Bonus Copyright Access (text)."

- id: reproduction-right
  broader: nordic-copyright
  labels:
    en: Right of Reproduction
    sv: Mangfaldiganderatt
    fi: Kappaleenoikeus
    da: Reproduktionsret
    nb: Eksemplarfremstillingsrett
  category: nordic-copyright-law
  description: "The exclusive right of the copyright holder to reproduce the work in any material form, including digital copies. A core economic right under all Nordic copyright acts."
  usage_guidance: "Digitization of museum objects constitutes reproduction. Ensure you have authorization from rights holders or rely on applicable exceptions before digitizing."

- id: moral-rights
  broader: nordic-copyright
  labels:
    en: Moral Rights
    sv: Ideell ratt
    fi: Moraaliset oikeudet
    da: Ideelle rettigheder
    nb: Ideelle rettigheter
  category: nordic-copyright-law
  description: "Non-transferable personal rights of the author including the right of attribution (namnangivelseratt) and the right of integrity (respektratt). In Nordic countries, moral rights cannot be fully waived."
  usage_guidance: "Always attribute the creator even when using CC0 or Public Domain Mark. Avoid modifications that could harm the author's reputation, even for public domain works."

- id: database-rights
  broader: nordic-copyright
  labels:
    en: Database Rights (Sui Generis)
    sv: Databasratt (sui generis)
    fi: Tietokantaoikeus (sui generis)
    da: Databaserettigheder (sui generis)
    nb: Databaserettigheter (sui generis)
  category: nordic-copyright-law
  description: "Sui generis protection for databases under EU Directive 96/9/EC, implemented in all Nordic countries. Protects substantial investment in obtaining, verifying, or presenting database contents for 15 years."
  usage_guidance: "Museum collection databases may qualify for sui generis protection. This is separate from copyright in individual entries. Consider CC0 for maximum interoperability of metadata."

- id: photographic-works-vs-images
  broader: nordic-copyright
  labels:
    en: Photographic Works vs. Photographic Images
    sv: Fotografiska verk vs. fotografiska bilder
    fi: Valokuvateokset vs. valokuvat
    da: Fotografiske vaerker vs. fotografiske billeder
    nb: Fotografiske verk vs. fotografiske bilder
  category: nordic-copyright-law
  description: "Nordic copyright law distinguishes between photographic works (original creative expression, full copyright term) and photographic images (any photograph, shorter protection of 50 years from creation). Critical for museum documentation photography."
  usage_guidance: "Most museum documentation photography (catalog photos, condition reports) qualifies as photographic images with 50-year protection. Artistic photography gets full copyright term (70 years post mortem)."

- id: museum-reproduction-rights
  broader: nordic-copyright
  labels:
    en: Museum Reproduction Rights
    sv: Museets reproduktionsratt
    fi: Museon toisinto-oikeudet
    da: Museets reproduktionsrettigheder
    nb: Museets reproduksjonsrettigheter
  category: nordic-copyright-law
  description: "The legal framework governing museum rights to reproduce and make available works in their collections. Varies based on whether the original work is in copyright and whether the reproduction itself generates new rights."
  usage_guidance: "For public domain originals, the museum's reproduction may still be protected as a photographic image. The Bridgeman Art Library v. Corel Corp. precedent (US) is not binding in Nordic jurisdictions."

# ═══════════════════════════════════════════════════════════════
# Europeana Rights Framework
# ═══════════════════════════════════════════════════════════════

- id: europeana-framework
  labels:
    en: Europeana Rights Framework
    sv: Europeanas rattighetsramverk
    fi: Europeanan oikeuksien kehys
    da: Europeanas rettighetsrammeverk
    nb: Europeanas rettighetsrammeverk
  category: europeana-framework
  canonical_uri: "https://www.europeana.eu/en/rights"
  description: "Top-level grouping for the Europeana rights and licensing framework. Europeana uses a tiered system to classify the openness of content rights statements."

- id: europeana-tier-1
  broader: europeana-framework
  labels:
    en: "Europeana Tier 1: Most Restrictive"
    sv: "Europeana Niva 1: Mest restriktiv"
    fi: "Europeana Taso 1: Rajoittavin"
    da: "Europeana Niveau 1: Mest restriktiv"
    nb: "Europeana Niva 1: Mest restriktiv"
  category: europeana-framework
  description: "The most restrictive tier in the Europeana licensing framework. Includes InC (In Copyright) and CC-BY-NC-ND. Content is viewable on Europeana but not reusable."
  usage_guidance: "Content at this tier has limited visibility and reuse potential on Europeana. Aim for more open tiers when possible to maximize cultural impact."

- id: europeana-tier-2
  broader: europeana-framework
  labels:
    en: "Europeana Tier 2: Restricted Reuse"
    sv: "Europeana Niva 2: Begransad ateranvandning"
    fi: "Europeana Taso 2: Rajoitettu uudelleenkaytto"
    da: "Europeana Niveau 2: Begraenset genbrug"
    nb: "Europeana Niva 2: Begrenset gjenbruk"
  category: europeana-framework
  description: "The restricted reuse tier. Includes CC-BY-NC and CC-BY-NC-SA licenses. Content can be reused for non-commercial purposes with attribution."
  usage_guidance: "Suitable for content where the institution needs to restrict commercial exploitation. Non-commercial licenses are widely used in education."

- id: europeana-tier-3
  broader: europeana-framework
  labels:
    en: "Europeana Tier 3: Free Reuse with Conditions"
    sv: "Europeana Niva 3: Fri ateranvandning med villkor"
    fi: "Europeana Taso 3: Vapaa uudelleenkaytto ehdoin"
    da: "Europeana Niveau 3: Fri genbrug med vilkar"
    nb: "Europeana Niva 3: Fri gjenbruk med vilkar"
  category: europeana-framework
  description: "Free reuse tier with conditions. Includes CC-BY-ND and NoC-CR (contractual restrictions). Content is generally reusable but with some limitations."
  usage_guidance: "A good middle ground. Content reaches a broad audience while maintaining some control over how it is presented or used."

- id: europeana-tier-4
  broader: europeana-framework
  labels:
    en: "Europeana Tier 4: Open / Public Domain"
    sv: "Europeana Niva 4: Oppen / Public Domain"
    fi: "Europeana Taso 4: Avoin / Public Domain"
    da: "Europeana Niveau 4: Aben / Public Domain"
    nb: "Europeana Niva 4: Apen / Public Domain"
  category: europeana-framework
  description: "The most open tier. Includes CC0, CC-BY, CC-BY-SA, Public Domain Mark, and NoC-US. Content is freely reusable, maximizing cultural and educational impact."
  usage_guidance: "The gold standard for open cultural heritage. Maximizes discoverability, reuse, and impact. Strongly recommended for metadata and public domain reproductions."

- id: europeana-dea
  broader: europeana-framework
  canonical_uri: "https://pro.europeana.eu/page/the-data-exchange-agreement"
  labels:
    en: Europeana Data Exchange Agreement
    sv: Europeanas datautbytesavtal
    fi: Europeanan tiedonvaihtosopimus
    da: Europeanas dataudvekslingsaftale
    nb: Europeanas datautvekslingsavtale
  category: europeana-framework
  description: "The agreement governing data exchange between Europeana and its data providers. Requires metadata to be provided under CC0 to enable maximum interoperability and reuse."
  usage_guidance: "All metadata submitted to Europeana must be licensed under CC0 per this agreement. This applies to descriptive metadata only, not to the digital objects themselves."

- id: europeana-metadata-guidelines
  broader: europeana-framework
  canonical_uri: "https://pro.europeana.eu/page/usage-guidelines-for-metadata"
  labels:
    en: Europeana Usage Guidelines for Metadata
    sv: Europeanas riktlinjer for anvandning av metadata
    fi: Europeanan metatiedon kayttoohjeet
    da: Europeanas retningslinjer for brug af metadata
    nb: Europeanas retningslinjer for bruk av metadata
  category: europeana-framework
  description: "Guidelines specifying how Europeana metadata should be used and attributed. Metadata provided to Europeana is available under CC0 for maximum reuse."
  usage_guidance: "Follow these guidelines when reusing metadata obtained from the Europeana API or portal. Attribution is encouraged as good practice even though CC0 does not legally require it."

- id: europeana-pd-charter
  broader: europeana-framework
  canonical_uri: "https://pro.europeana.eu/page/the-europeana-public-domain-charter"
  labels:
    en: Europeana Public Domain Charter
    sv: Europeanas Public Domain-stadga
    fi: Europeanan Public Domain -peruskirja
    da: Europeanas Public Domain-charter
    nb: Europeanas Public Domain-charter
  category: europeana-framework
  description: "Europeana's charter affirming that works in the public domain should remain freely available. Digitization of public domain works should not create new exclusive rights over the digital reproductions."
  usage_guidance: "Key principle: faithful digital reproductions of public domain 2D works should not be restricted by new copyright claims. This reflects the spirit of open access to cultural heritage."

# ═══════════════════════════════════════════════════════════════
# Common Museum Scenarios
# ═══════════════════════════════════════════════════════════════

- id: museum-scenarios
  labels:
    en: Common Museum Rights Scenarios
    sv: Vanliga museirattighetsscenarier
    fi: Yleiset museooikeusskenaariot
    da: Almindelige museumsrettighedsscenarier
    nb: Vanlige museumsrettighetsscenarier
  category: museum-scenario
  description: "Top-level grouping for common rights scenarios encountered by Nordic museums when digitizing and publishing collection materials."

- id: scenario-pre-1900-artwork
  broader: museum-scenarios
  labels:
    en: Pre-1900 Artwork (Photographer Unknown)
    sv: Konstverk fore 1900 (fotograf okand)
    fi: Ennen vuotta 1900 luotu taideteos (valokuvaaja tuntematon)
    da: Kunstvaerk for 1900 (fotograf ukendt)
    nb: Kunstverk for 1900 (fotograf ukjent)
  category: museum-scenario
  description: "Artwork created before 1900 where the photographer of the digital reproduction is unknown. The original is almost certainly in the public domain (70-year post-mortem rule), but the digital reproduction may have limited protection as a photographic image."
  usage_guidance: "Recommended: Public Domain Mark 1.0 for the original work. For faithful 2D reproductions, follow the Europeana Public Domain Charter principle. If the photographer is a museum employee, apply the museum's standard open license."

- id: scenario-contemporary-artwork
  broader: museum-scenarios
  labels:
    en: Contemporary Artwork with Living Artist
    sv: Samtida konstverk med levande konstnar
    fi: Nykytaideteos elavan taiteilijan kanssa
    da: Samtidskunstvaerk med levende kunstner
    nb: Samtidskunstverk med levende kunstner
  category: museum-scenario
  description: "Artworks by living or recently deceased artists where copyright is still active. Both the original work and the documentation photograph may be separately protected."
  usage_guidance: "Recommended: InC (In Copyright) unless the artist has granted a specific license. Consider extended collective licensing (avtalslicens) for online access. Contact Bildupphovsratt (SE), Kuvasto (FI), or BONO (NO)."

- id: scenario-museum-photography-2d
  broader: museum-scenarios
  labels:
    en: Museum-Commissioned Photography of 2D Works
    sv: Museibestallda fotografier av 2D-verk
    fi: Museon tilaamat valokuvat 2D-teoksista
    da: Museumsbestilte fotografier af 2D-vaerker
    nb: Museumsbestilte fotografier av 2D-verk
  category: museum-scenario
  description: "Photographs commissioned by the museum to document flat/2D collection objects. For faithful reproductions of public domain 2D works, the photograph may not generate independent copyright (following the Europeana Public Domain Charter)."
  usage_guidance: "If the original 2D work is in the public domain, recommended: Public Domain Mark or CC0 for faithful reproductions. If the original is in copyright, the photograph adds a layer of rights requiring both artist and photographer clearance."

- id: scenario-archaeological-finds
  broader: museum-scenarios
  labels:
    en: Archaeological Finds (State Ownership)
    sv: Arkeologiska fynd (statlig aganderatt)
    fi: Arkeologiset loydot (valtion omistus)
    da: Arkaeologiske fund (statseje)
    nb: Arkeologiske funn (statlig eiendom)
  category: museum-scenario
  description: "Archaeological objects typically owned by the state under Nordic cultural heritage legislation. Copyright may not apply to the objects themselves, but documentation photographs may be protected."
  usage_guidance: "The objects themselves are generally not copyrighted (utilitarian or ancient). Recommended: CC-BY 4.0 or CC0 for museum-created documentation photographs. Respect any export or cultural property restrictions (NoC-OKLR)."

- id: scenario-born-digital
  broader: museum-scenarios
  labels:
    en: Born-Digital Museum Content
    sv: Digitalt fodd museiinnehall
    fi: Digitaalisesti syntynyt museosisalto
    da: Digitalt fodt museumsindhold
    nb: Digitalt fodt museumsinnhold
  category: museum-scenario
  description: "Content created directly in digital form by the museum, such as virtual exhibitions, 3D scans, interactive guides, educational materials, and social media content."
  usage_guidance: "The museum typically holds all rights. Recommended: CC-BY 4.0 for maximum reuse, or CC-BY-SA 4.0 if share-alike is desired. Use CC0 for metadata and factual data."

- id: scenario-metadata-records
  broader: museum-scenarios
  labels:
    en: Metadata and Catalog Records
    sv: Metadata och katalogposter
    fi: Metatiedot ja luettelointitietueet
    da: Metadata og katalogposter
    nb: Metadata og katalogposter
  category: museum-scenario
  description: "Descriptive metadata, catalog records, and structured data about collection objects. Generally factual in nature with limited or no copyright protection, but may be protected as databases."
  usage_guidance: "Strongly recommended: CC0. Required by Europeana Data Exchange Agreement. Factual metadata has minimal copyright protection in most cases, making CC0 the natural choice."

- id: scenario-educational-use
  broader: museum-scenarios
  labels:
    en: Educational Use of Copyrighted Material
    sv: Utbildningsanvandning av upphovsrattsskyddat material
    fi: Tekijanoikeudella suojatun materiaalin opetuskaytto
    da: Undervisningsbrug af ophavsretligt beskyttet materiale
    nb: Undervisningsbruk av opphavsrettsbeskyttet materiale
  category: museum-scenario
  description: "Use of copyrighted collection materials for educational purposes such as lectures, teaching materials, and school programs. Nordic copyright laws provide specific exceptions for educational use."
  usage_guidance: "Apply InC-EDU if the rights holder has authorized educational use. Otherwise, rely on national copyright exceptions for education (e.g., Swedish Copyright Act Section 42c). Extended collective licensing may also apply."

- id: scenario-sami-heritage
  broader: museum-scenarios
  labels:
    en: Sami Cultural Heritage Considerations
    sv: Samisk kulturarvshantering
    fi: Saamelaisen kulttuuriperinnon huomiointi
    da: Samisk kulturarvshensyn
    nb: Samisk kulturarvshensyn
    se: Sami kulturarbi
  category: museum-scenario
  description: "Special considerations for Sami cultural heritage materials, including traditional knowledge, joik recordings, duodji (crafts), and sacred or sensitive cultural objects. Requires engagement with Sami communities and institutions."
  usage_guidance: "Standard copyright licenses may be insufficient. Consider Traditional Knowledge labels (Local Contexts). Consult with Sami Parliament (Sametinget) and relevant Sami museums (Ajtte, Siida, RiddoDuottarMuseat). Follow CARE principles for Indigenous data governance."

- id: scenario-traditional-knowledge
  broader: museum-scenarios
  labels:
    en: Traditional Knowledge Labels
    sv: Traditionell kunskapsmarkning
    fi: Perinteisen tiedon merkinta
    da: Traditionel vidensmaerkning
    nb: Tradisjonell kunnskapsmerking
  category: museum-scenario
  canonical_uri: "https://localcontexts.org/labels/traditional-knowledge-labels/"
  description: "Labels developed by the Local Contexts initiative to address intellectual property issues for Indigenous communities. Provide culturally specific information about how traditional knowledge should be accessed and used."
  usage_guidance: "TK Labels complement rather than replace standard licenses. They communicate community expectations for use. Applicable to Sami collections and other Indigenous materials in Nordic museums. Work with communities to select appropriate labels."
