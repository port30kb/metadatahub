# Asian Historical & Cultural Periods

- id: south-asia-history
  rank: CulturalAge
  parent: holocene
  start: 7000
  end: 0
  unit: BCE-CE
  labels:
    en: South Asian Historical Periods
    sv: Sydasiatiska historiska perioder
    hi: दक्षिण एशिया के ऐतिहासिक काल
  description: "From Mehrgarh Neolithic through Indus Valley, Vedic, Mauryan, Mughal to modern India, Pakistan, Bangladesh, Sri Lanka."

- id: mehrgarh
  rank: CulturalAge
  parent: south-asia-history
  start: 7000
  end: 2500
  unit: BCE
  labels:
    en: Mehrgarh
    sv: Mehrgarh
    ar: مہرگڑھ Mehrgaṛh
  description: "Neolithic site in Balochistan; one of earliest farming settlements in South Asia; precursor to Indus Valley; dentistry evidence ~7000 BCE."

- id: indus-valley
  rank: CulturalAge
  parent: south-asia-history
  start: 3300
  end: 1300
  unit: BCE
  labels:
    en: Indus Valley Civilization
    sv: Induskulturen
    hi: सिन्धु घाटी सभ्यता
  description: "Harappa, Mohenjo-daro; urban planning, drainage systems; undeciphered script; ~5 million people; one of three earliest civilizations."

- id: indus-early
  rank: CulturalAge
  parent: indus-valley
  start: 3300
  end: 2600
  unit: BCE
  labels:
    en: Early Harappan Phase
    sv: Tidig Harappafas
    ar: ابتدائی ہڑپہ دور
    hi: प्रारंभिक हड़प्पा काल
  description: "Pre-urban phase; small farming communities; Ravi and Kot Diji cultures; early pottery and copper tools; transition to urban phase c. 2600 BCE; sites include Rehman Dheri and Amri."

- id: indus-mature
  rank: CulturalAge
  parent: indus-valley
  start: 2600
  end: 1900
  unit: BCE
  labels:
    en: Mature Harappan Phase
    sv: Mogen Harappafas
    ar: پختہ ہڑپہ دور
    hi: परिपक्व हड़प्पा काल
  description: "Peak of Indus civilization; standardized weights and measures; Great Bath of Mohenjo-daro; trade with Mesopotamia; citadel-lower town layout."

- id: indus-late
  rank: CulturalAge
  parent: indus-valley
  start: 1900
  end: 1300
  unit: BCE
  labels:
    en: Late Harappan Phase
    sv: Sen Harappafas
    ar: آخری ہڑپہ دور
    hi: उत्तर हड़प्पा काल
  description: "Post-urban decline; abandonment of major cities; Cemetery H and Gandhara Grave cultures; localization of material culture; climate change and monsoon shifts implicated in collapse; possible continuity into early Vedic culture."

- id: vedic-period
  rank: CulturalAge
  parent: south-asia-history
  start: 1500
  end: 500
  unit: BCE
  labels:
    en: Vedic Period
    sv: Vedisk period
    hi: वैदिक काल
  description: "Composition of the Vedas (Rigveda ~1500 BCE); Sanskrit; varna system; Aryan migration debate; transition from pastoral to settled agriculture."

- id: vedic-early
  rank: CulturalAge
  parent: vedic-period
  start: 1500
  end: 1000
  unit: BCE
  labels:
    en: Early Vedic Period
    sv: Vedisk period
    hi: पूर्व वैदिक काल Pūrva Vaidika Kāl
  description: "Rigveda composition; pastoral-nomadic society; Indra worship; tribal kingdoms (janapadas); Punjab region focus."

- id: vedic-late
  rank: CulturalAge
  parent: vedic-period
  start: 1000
  end: 500
  unit: BCE
  labels:
    en: Late Vedic Period
    sv: Vedisk period
    hi: उत्तर वैदिक काल Uttara Vaidika Kāl
  description: "Expansion to Ganges plain; Painted Grey Ware; Upanishads; emergence of Buddhism and Jainism; Mahajanapadas (16 great kingdoms)."

- id: maurya-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 322
  end: 185
  unit: BCE
  labels:
    en: Maurya Empire
    sv: Mauryariket
    hi: मौर्य साम्राज्य
  description: "First pan-Indian empire; Chandragupta Maurya; Ashoka the Great (~268-232 BCE); edicts of non-violence; Arthashastra; Pataliputra capital."

- id: ashoka
  rank: CulturalAge
  parent: maurya-empire
  start: 268
  end: 232
  unit: BCE
  labels:
    en: Reign of Ashoka
    sv: Ashokas regeringstid
    hi: अशोक का शासनकाल
  description: "Greatest Mauryan emperor; Kalinga War conversion to Buddhism; rock and pillar edicts; Lion Capital (Indian national emblem); spread of Dharma."

- id: gandhara
  rank: CulturalAge
  parent: south-asia-history
  start: 600
  end: 1021
  unit: BCE-CE
  labels:
    en: Gandhara Civilization
    sv: Gandharacivilisationen
    ar: گندھارا
    hi: गन्धार Gandhāra
  description: "Northwest Pakistan/eastern Afghanistan; Greco-Buddhist art synthesis; Taxila university; Alexander's campaigns; Kushan patronage; Hindu Shahi; fell to Ghaznavids."

- id: kushan-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 30
  end: 375
  unit: CE
  labels:
    en: Kushan Empire
    sv: Kushanriket
    hi: कुषाण साम्राज्य Kuṣāṇa
  description: "Central Asian origin; Kanishka I; Gandhara Buddhist art (Greco-Buddhist); Silk Road trade; Mathura and Peshawar; spread Buddhism to China."

- id: gupta-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 320
  end: 550
  unit: CE
  labels:
    en: Gupta Empire
    sv: Guptariket
    hi: गुप्त साम्राज्य
  description: "Golden Age of India; Chandragupta I, Samudragupta, Chandragupta II; Aryabhata (mathematics/astronomy); Kalidasa; Nalanda University; decimal system."

- id: satavahana
  rank: CulturalAge
  parent: south-asia-history
  start: 100
  end: 220
  unit: BCE-CE
  labels:
    en: Satavahana Dynasty
    sv: Satavahanadynastin
    hi: शातवाहन
  description: "Major Deccan power; bridge between Maurya and Gupta; Amaravati stupa; Prakrit patronage; controlled trade routes between north and south India."

- id: pallava-dynasty
  rank: CulturalAge
  parent: south-asia-history
  start: 275
  end: 897
  unit: CE
  labels:
    en: Pallava Dynasty
    sv: Pallavadynastin
  description: "South Indian dynasty; Shore Temple and Pancha Rathas at Mamallapuram (UNESCO); Pallava script influenced Southeast Asian scripts; Dravidian architecture."

- id: chalukya-dynasty
  rank: CulturalAge
  parent: south-asia-history
  start: 543
  end: 1190
  unit: CE
  labels:
    en: Chalukya Dynasty
    sv: Chalukyadynastin
  description: "Major Deccan empire; Badami, Western and Eastern Chalukyas; Pattadakal temples (UNESCO); rival to Pallavas and Cholas; Kannada literary tradition."

- id: chola-dynasty
  rank: CulturalAge
  parent: south-asia-history
  start: 300
  end: 1279
  unit: BCE-CE
  labels:
    en: Chola Dynasty
    sv: Choladynastin
  description: "Tamil Nadu; one of longest-ruling dynasties; Rajaraja I, Rajendra I; naval power; Brihadeeswarar Temple; influence across Southeast Asia."

- id: pala-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 750
  end: 1174
  unit: CE
  labels:
    en: Pala Empire
    sv: Palariket
  description: "Eastern India (Bengal-Bihar); last major Buddhist empire in India; Nalanda and Vikramashila universities; Pala school of art; tantric Buddhism."

- id: delhi-sultanate
  rank: CulturalAge
  parent: south-asia-history
  start: 1206
  end: 1526
  unit: CE
  labels:
    en: Delhi Sultanate
    sv: Delhisultanatet
    ar: دلی سلطنت
    hi: दिल्ली सल्तनत
  description: "Five successive Islamic dynasties ruling from Delhi; Qutub Minar; repelled Mongol invasions; Slave, Khalji, Tughlaq, Sayyid, Lodi dynasties."

- id: vijayanagara
  rank: CulturalAge
  parent: south-asia-history
  start: 1336
  end: 1646
  unit: CE
  labels:
    en: Vijayanagara Empire
    sv: Vijayanagarariket
  description: "Hindu empire of southern India; Hampi capital (UNESCO); resisted Bahmani/Deccan sultanates; patronized Telugu, Kannada, Tamil literature."

- id: mughal-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 1526
  end: 1857
  unit: CE
  labels:
    en: Mughal Empire
    sv: Mogulriket
    ar: مغلیہ سلطنت
    hi: मुग़ल सल्तनत
  description: "Babur, Akbar, Shah Jahan, Aurangzeb; Taj Mahal; religious tolerance (Akbar's Din-i Ilahi); zenith of Indo-Islamic architecture; ~25% of world GDP."

- id: mughal-golden-age
  rank: CulturalAge
  parent: mughal-empire
  start: 1556
  end: 1707
  unit: CE
  labels:
    en: Mughal Golden Age
    sv: Mogulrikets guldålder
    ar: مغلیہ سلطنت کا عروج
  description: "Akbar through Aurangzeb; Taj Mahal (1632-53); Red Fort; miniature painting; administrative reforms; territorial peak under Aurangzeb."

- id: maratha-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 1674
  end: 1818
  unit: CE
  labels:
    en: Maratha Empire
    sv: Marathariket
    hi: मराठा साम्राज्य
  description: "Shivaji Maharaj; Hindu Padshahi; challenged Mughal decline; Peshwa era; confederacy; Battle of Panipat (1761); eventually fell to British."

- id: sikh-empire
  rank: CulturalAge
  parent: south-asia-history
  start: 1799
  end: 1849
  unit: CE
  labels:
    en: Sikh Empire
    sv: Sikhriket
  description: "Maharaja Ranjit Singh; Punjab-based empire; secular governance; Khalsa army; Kohinoor diamond; Anglo-Sikh Wars; annexed by British East India Company."

- id: british-raj
  rank: CulturalAge
  parent: south-asia-history
  start: 1858
  end: 1947
  unit: CE
  labels:
    en: British Raj
    sv: Brittiska Indien
    hi: ब्रिटिश राज
  description: "Direct British Crown rule; railways; English education; Bengal famine (1943); Indian National Congress; Muslim League; independence movement."

- id: indian-independence
  rank: CulturalAge
  parent: british-raj
  start: 1885
  end: 1947
  unit: CE
  labels:
    en: Indian Independence Movement
    sv: Indiska självständighetsrörelsen
    hi: भारतीय स्वतंत्रता आन्दोलन
  description: "INC founded (1885); Swadeshi; Gandhi's satyagraha; Salt March (1930); Quit India (1942); Partition; independence August 15, 1947."

- id: south-asia-modern
  rank: CulturalAge
  parent: contemporary
  start: 1947
  end: 0
  unit: CE
  labels:
    en: Modern South Asia
    sv: Moderna Sydasien
    hi: आधुनिक दक्षिण एशिया
  description: "Partition of India and Pakistan; Bangladesh liberation (1971); Sri Lankan civil war; nuclear powers; IT revolution; world's largest democracy."

- id: anuradhapura-kingdom
  rank: CulturalAge
  parent: south-asia-history
  start: 377
  end: 1017
  unit: BCE-CE
  labels:
    en: Anuradhapura Kingdom
    sv: Kungariket Anuradhapura
  description: "First major Sinhalese kingdom; 1,400-year rule; center of Theravada Buddhism; massive irrigation works (tanks); UNESCO World Heritage site."

- id: polonnaruwa-kingdom
  rank: CulturalAge
  parent: south-asia-history
  start: 1055
  end: 1212
  unit: CE
  labels:
    en: Polonnaruwa Kingdom
    sv: Kungariket Polonnaruwa
  description: "Second Sinhalese capital after Chola expulsion; Parakramabahu the Great; superior irrigation systems; Gal Vihara Buddha statues; UNESCO site."

- id: kingdom-of-kandy
  rank: CulturalAge
  parent: south-asia-history
  start: 1469
  end: 1815
  unit: CE
  labels:
    en: Kingdom of Kandy
    sv: Kungariket Kandy
  description: "Last independent Sinhalese monarchy; resisted Portuguese and Dutch for centuries; Temple of the Tooth Relic (Sri Dalada Maligawa); fell to British 1815."

- id: licchavi-nepal
  rank: CulturalAge
  parent: south-asia-history
  start: 400
  end: 750
  unit: CE
  labels:
    en: Licchavi Kingdom of Nepal
    sv: "Licchavi-riket i Nepal"
    hi: लिच्छवि राजवंश
  description: "Golden Period of Nepal; earliest inscriptions (Manadeva, 464 CE); connected Kathmandu Valley to Indian subcontinent trade and culture."

- id: malla-nepal
  rank: CulturalAge
  parent: south-asia-history
  start: 1200
  end: 1768
  unit: CE
  labels:
    en: Malla Kingdoms of Nepal
    sv: "Malla-rikena i Nepal"
    hi: मल्ल राजवंश
  description: "600-year rule; split into Kathmandu, Bhaktapur, Lalitpur after 1482; Newar civilization flourished; extraordinary pagoda temple architecture."

- id: sena-dynasty
  rank: CulturalAge
  parent: south-asia-history
  start: 1097
  end: 1225
  unit: CE
  labels:
    en: Sena Dynasty
    sv: Senadynastin
  description: "Unified all of Bengal; Hindu revival after Buddhist Pala rule; Jayadeva's Gita Govinda; established Bengali caste system."

- id: bengal-sultanate
  rank: CulturalAge
  parent: south-asia-history
  start: 1342
  end: 1538
  unit: CE
  labels:
    en: Bengal Sultanate
    sv: Bengalsultanatet
  description: "Independent Islamic state; 'richest country to trade with'; first Bengali court language recognition; distinctive Bengali-Islamic architecture."

- id: china-history
  rank: CulturalAge
  parent: holocene
  start: 7000
  end: 0
  unit: BCE-CE
  labels:
    en: Chinese Historical Periods
    sv: Kinesiska historiska perioder
    zh: 中国历史时期 Zhōngguó lìshǐ shíqī
  description: "From Neolithic cultures through dynastic cycle to modern People's Republic; continuous civilization spanning 5,000+ years."

- id: chinese-neolithic
  rank: CulturalAge
  parent: china-history
  start: 7000
  end: 2070
  unit: BCE
  labels:
    en: Chinese Neolithic Cultures
    sv: Kinesiska neolitiska kulturer
    zh: 中国新石器时代文化 Zhōngguó xīn shíqì shídài wénhuà
  description: "Yangshao (painted pottery), Longshan (black pottery), Liangzhu (jade); rice and millet cultivation; proto-cities; foundations of Chinese civilization."

- id: xia-dynasty
  rank: CulturalAge
  parent: china-history
  start: 2070
  end: 1600
  unit: BCE
  labels:
    en: Xia Dynasty
    sv: Xiadynastin
    zh: 夏朝 Xià Cháo
  description: "First Chinese dynasty (semi-legendary); Yu the Great; flood control; Erlitou culture; bronze vessels; transition from Neolithic to Bronze Age."

- id: shang-dynasty
  rank: CulturalAge
  parent: china-history
  start: 1600
  end: 1046
  unit: BCE
  labels:
    en: Shang Dynasty
    sv: Shangdynastin
    zh: 商朝 Shāng Cháo
  description: "First historically verified dynasty; oracle bone inscriptions (earliest Chinese writing); bronze ritual vessels; Anyang capital; ancestor worship."

- id: zhou-dynasty
  rank: CulturalAge
  parent: china-history
  start: 1046
  end: 256
  unit: BCE
  labels:
    en: Zhou Dynasty
    sv: Zhoudynastin
    zh: 周朝 Zhōu Cháo
  description: "Longest Chinese dynasty; Mandate of Heaven concept; feudal system; divided into Western Zhou and Eastern Zhou (Spring and Autumn, Warring States)."

- id: spring-autumn
  rank: CulturalAge
  parent: zhou-dynasty
  start: 771
  end: 476
  unit: BCE
  labels:
    en: Spring and Autumn Period
    sv: "Vår- och höstperioden"
    zh: 春秋時代 Chūnqiū
  description: "Confucius (551-479), Laozi (Daoism), Sun Tzu; Hundred Schools of Thought begins; hegemonic states; iron technology spreads."

- id: warring-states
  rank: CulturalAge
  parent: zhou-dynasty
  start: 475
  end: 221
  unit: BCE
  labels:
    en: Warring States Period
    sv: De stridande staternas period
    zh: 戰國時代 Zhànguó
  description: "Seven major states; Mencius, Zhuangzi, Legalism (Han Feizi); crossbow, cavalry; mass armies; ends with Qin unification."

- id: qin-dynasty
  rank: CulturalAge
  parent: china-history
  start: 221
  end: 206
  unit: BCE
  labels:
    en: Qin Dynasty
    sv: Qindynastin
    zh: 秦朝 Qín Cháo
  description: "First unified Chinese empire; Qin Shi Huang; Great Wall begun; Terracotta Army; standardized weights, measures, writing; Legalist rule; burned books."

- id: han-dynasty
  rank: CulturalAge
  parent: china-history
  start: 206
  end: 220
  unit: BCE-CE
  labels:
    en: Han Dynasty
    sv: Handynastin
    zh: 漢朝 Hàn Cháo
  description: "Golden age; Confucianism as state ideology; Silk Road opens (Zhang Qian); paper invented; civil service exams; ~60 million people; 'Han Chinese' identity."

- id: han-western
  rank: CulturalAge
  parent: han-dynasty
  start: 206
  end: 9
  unit: BCE
  labels:
    en: Western Han
    sv: Västra Han
    zh: 西漢 Xī Hàn
  description: "Emperor Wu expands empire; Silk Road trade; Sima Qian's Records of the Grand Historian; Confucian academy; Chang'an capital."

- id: han-eastern
  rank: CulturalAge
  parent: han-dynasty
  start: 25
  end: 220
  unit: CE
  labels:
    en: Eastern Han
    sv: Östra Han
    zh: 東漢 Dōng Hàn
  description: "Restored Han; Luoyang capital; Buddhism arrives; invention of paper (Cai Lun, 105 CE); seismograph (Zhang Heng); Yellow Turban Rebellion."

- id: three-kingdoms
  rank: CulturalAge
  parent: china-history
  start: 220
  end: 280
  unit: CE
  labels:
    en: Three Kingdoms Period
    sv: De tre rikenas tid
    zh: 三國時代 Sānguó
  description: "Wei, Shu, Wu; Cao Cao, Liu Bei, Sun Quan, Zhuge Liang; Romance of the Three Kingdoms; one of most romanticized eras in Chinese culture."

- id: six-dynasties
  rank: CulturalAge
  parent: china-history
  start: 220
  end: 589
  unit: CE
  labels:
    en: Six Dynasties / Northern and Southern Dynasties
    sv: "Sex dynastierna / Nord- och Syddynastierna"
    zh: 六朝/南北朝
  description: "300-year era of division; Jin, Sixteen Kingdoms, Northern and Southern Dynasties; Buddhism takes root; Wang Xizhi calligraphy; ethnic integration of steppe peoples."

- id: sixteen-kingdoms
  rank: CulturalAge
  parent: six-dynasties
  start: 304
  end: 439
  unit: CE
  labels:
    en: Sixteen Kingdoms
    sv: Sexton kungadömena
    zh: 十六國/五胡十六國
  description: "Non-Han peoples (Xiongnu, Xianbei, Di, Qiang, Jie) establish kingdoms across northern China; reshapes Chinese demographics and culture."

- id: sui-dynasty
  rank: CulturalAge
  parent: china-history
  start: 581
  end: 618
  unit: CE
  labels:
    en: Sui Dynasty
    sv: Suidynastin
    zh: 隋朝 Suí Cháo
  description: "Reunification after centuries of division; Grand Canal construction; Great Wall rebuilt; civil service exams restored; overextension leads to collapse."

- id: tang-dynasty
  rank: CulturalAge
  parent: china-history
  start: 618
  end: 907
  unit: CE
  labels:
    en: Tang Dynasty
    sv: Tangdynastin
    zh: 唐朝 Táng Cháo
  description: "Golden age of Chinese civilization; Chang'an largest city in world; Li Bai, Du Fu (poetry); Wu Zetian (only female emperor); cosmopolitan culture; Silk Road peak."

- id: five-dynasties
  rank: CulturalAge
  parent: china-history
  start: 907
  end: 960
  unit: CE
  labels:
    en: Five Dynasties and Ten Kingdoms
    sv: Fem dynastier och tio kungadömen
    zh: 五代十國 Wǔdài Shíguó
  description: "Fragmentation after Tang; five rapid northern dynasties; ten southern kingdoms; political chaos; printing technology spreads; prelude to Song reunification."

- id: song-dynasty
  rank: CulturalAge
  parent: china-history
  start: 960
  end: 1279
  unit: CE
  labels:
    en: Song Dynasty
    sv: Songdynastin
    zh: 宋朝 Sòng Cháo
  description: "Economic revolution; movable type printing; gunpowder weapons; compass; paper money; Neo-Confucianism; landscape painting; commercial economy."

- id: song-northern
  rank: CulturalAge
  parent: song-dynasty
  start: 960
  end: 1127
  unit: CE
  labels:
    en: Northern Song
    sv: Norra Song
    zh: 北宋 Běi Sòng
  description: "Kaifeng capital; Su Shi (poet); Shen Kuo (polymath); Dream Pool Essays; commercial revolution; lost north to Jurchen Jin dynasty."

- id: jin-jurchen
  rank: CulturalAge
  parent: china-history
  start: 1115
  end: 1234
  unit: CE
  labels:
    en: Jin Dynasty
    sv: Jindynastin
    zh: "Jurchen, 金朝"
  description: "Jurchen conquest of northern China; sinicized administration; rivalry with Southern Song; fell to Mongols; predecessor to Manchu Qing."

- id: liao-dynasty
  rank: CulturalAge
  parent: china-history
  start: 916
  end: 1125
  unit: CE
  labels:
    en: Liao Dynasty
    sv: Liaodynastin
    zh: 遼朝
  description: "Khitan empire; 'Cathay' derives from Khitan; dual administration (nomadic + Chinese); Chanyuan Treaty with Song (1004); own writing system."

- id: western-xia
  rank: CulturalAge
  parent: china-history
  start: 1038
  end: 1227
  unit: CE
  labels:
    en: Western Xia
    sv: Västra Xia
    zh: 西夏
  description: "Tangut empire controlling Hexi Corridor (Silk Road); unique Tangut script; three-way balance with Song and Liao/Jin; annihilated by Mongols."

- id: song-southern
  rank: CulturalAge
  parent: song-dynasty
  start: 1127
  end: 1279
  unit: CE
  labels:
    en: Southern Song
    sv: Södra Song
    zh: 南宋 Nán Sòng
  description: "Hangzhou capital ('above is heaven, below is Hangzhou'); maritime trade; Zhu Xi Neo-Confucianism; fell to Mongol Yuan dynasty."

- id: yuan-dynasty
  rank: CulturalAge
  parent: china-history
  start: 1271
  end: 1368
  unit: CE
  labels:
    en: Yuan Dynasty
    sv: Yuandynastin
  description: "Kublai Khan; Mongol rule over China; Marco Polo visits; Grand Canal extended; Yuan drama; paper money inflation; ethnic hierarchy."

- id: ming-dynasty
  rank: CulturalAge
  parent: china-history
  start: 1368
  end: 1644
  unit: CE
  labels:
    en: Ming Dynasty
    sv: Mingdynastin
    zh: 明朝 Míng Cháo
  description: "Han Chinese restoration; Forbidden City (Beijing); Zheng He voyages (1405-33); Great Wall rebuilt; porcelain golden age; novel tradition flourishes."

- id: zheng-he
  rank: CulturalAge
  parent: ming-dynasty
  start: 1405
  end: 1433
  unit: CE
  labels:
    en: Zheng He Voyages
    sv: Zheng He Voyages
    zh: 郑和下西洋 Zhèng Hé xià Xīyáng
  description: "Seven grand maritime expeditions; treasure ships; reached East Africa, Arabia, Southeast Asia; then China turned inward; ended oceanic exploration."

- id: qing-dynasty
  rank: CulturalAge
  parent: china-history
  start: 1644
  end: 1912
  unit: CE
  labels:
    en: Qing Dynasty
    sv: Qingdynastin
    zh: 清朝 Qīng Cháo
  description: "Manchu rule; largest Qing territory; Kangxi, Qianlong emperors; Opium Wars; Taiping Rebellion (~20-30M dead); Century of Humiliation; fall to revolution."

- id: qing-golden-age
  rank: CulturalAge
  parent: qing-dynasty
  start: 1661
  end: 1796
  unit: CE
  labels:
