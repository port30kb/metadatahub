  end: 4000
  unit: BCE
  labels:
    en: Kuk Early Agriculture
    sv: Tidig jordbruk vid Kuk
  description: "Kuk Swamp, PNG highlands; independent invention of agriculture; banana, taro, yam cultivation; drainage ditches; one of world's earliest farming sites."

- id: ancient-fiji
  rank: CulturalAge
  parent: melanesia-history
  start: 1300
  end: 1874
  unit: BCE-CE
  labels:
    en: Ancient Fiji
    sv: Forntida Fiji
  description: "Settled by Lapita people ~1300 BCE; complex chiefdom system; cannibal culture; drua double-hulled canoes; cultural crossroads of Melanesia and Polynesia."

- id: lapita-culture
  rank: CulturalAge
  parent: oceania-history
  start: 1600
  end: 500
  unit: BCE
  labels:
    en: Lapita Culture
    sv: Lapitakulturen
  description: "Ancestral Polynesian culture; distinctive dentate-stamped pottery; originated Bismarck Archipelago; spread to Fiji, Tonga, Samoa; skilled navigators."

- id: polynesia-history
  rank: CulturalAge
  parent: oceania-history
  start: 1500
  end: 0
  unit: BCE-CE
  labels:
    en: Polynesian Civilizations
    sv: Polynesiska civilisationer
  description: "Greatest maritime expansion in human history; settled Pacific from Tonga/Samoa to Hawaiʻi, Easter Island, New Zealand; navigation by stars, currents, birds."

- id: polynesia-ancestral
  rank: CulturalAge
  parent: polynesia-history
  start: 1500
  end: 200
  unit: BCE
  labels:
    en: Ancestral Polynesia
    sv: Forntida Polynesien
  description: "Tonga settled ~1500 BCE, Samoa ~1000 BCE; development of Polynesian culture, language, navigation; chiefdom societies; kava traditions."

- id: polynesia-expansion
  rank: CulturalAge
  parent: polynesia-history
  start: 300
  end: 1300
  unit: CE
