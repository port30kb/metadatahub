# Oceanian Historical & Cultural Periods

- id: oceania-history
  rank: CulturalAge
  parent: holocene
  start: 65000
  end: 0
  unit: BCE-CE
  labels:
    en: Oceanian Historical Periods
    sv: Oceaniens historiska perioder
  description: "Oldest continuous cultures on Earth; Aboriginal Australians, Melanesian, Polynesian, Micronesian peoples; maritime mastery; colonial disruption."

- id: aboriginal-australia
  rank: CulturalAge
  parent: oceania-history
  start: 65000
  end: 1788
  unit: BCE-CE
  labels:
    en: Aboriginal Australian Periods
    sv: Aboriginsk australisk historia
  description: "Oldest continuous civilization; Dreamtime/Dreaming; rock art (Kakadu, Kimberley); fire-stick farming; ~250 language groups; 65,000+ years."

- id: aboriginal-early
  rank: CulturalAge
  parent: aboriginal-australia
  start: 65000
  end: 10000
  unit: BCE
  labels:
    en: Early Aboriginal Period
    sv: Tidig aboriginsk period
  description: "First Australians arrive (~65,000 BP); Lake Mungo burials (~42,000 BP); megafauna coexistence and extinction; continent-wide spread; earliest rock art."

- id: aboriginal-holocene
  rank: CulturalAge
  parent: aboriginal-australia
  start: 10000
  end: 1788
  unit: BCE-CE
  labels:
    en: Aboriginal Holocene Period
    sv: Aboriginsk holocen period
  description: "Sea level rise creates modern coastline; Torres Strait Islands separate; intensification; fish traps (Brewarrina ~40,000 years); complex trade networks; songlines."

- id: budj-bim
  rank: CulturalAge
  parent: aboriginal-australia
  start: 6600
  end: 1788
  unit: BCE-CE
  labels:
    en: Budj Bim Cultural Landscape
    sv: Budj Bim kulturlandskap
  description: "Gunditjmara people, Victoria; world's oldest aquaculture system (~6,600 years); eel traps and stone channels; permanent stone dwellings; UNESCO World Heritage Site (2019)."

- id: torres-strait-islanders
  rank: CulturalAge
  parent: oceania-history
  start: 8000
  end: 0
  unit: BCE-CE
  labels:
    en: Torres Strait Islander Culture
    sv: "Torres Sund-öbornas kultur"
  description: "Melanesian peoples of Torres Strait Islands; distinct from Aboriginal Australians; seafaring; horticulture; Tombstone Opening ceremonies; star lore navigation."

- id: australian-colonial
  rank: CulturalAge
  parent: oceania-history
  start: 1788
  end: 1901
  unit: CE
  labels:
    en: Colonial Australia
    sv: Koloniala Australien
  description: "First Fleet (1788); penal colony; frontier wars; gold rushes (1850s); pastoralism; Stolen Generations begin; six colonies; White Australia policy roots."

- id: australian-federation
  rank: CulturalAge
  parent: oceania-history
  start: 1901
  end: 0
  unit: CE
  labels:
    en: Federation and Modern Australia
    sv: Australiens federation och modern tid
  description: "Commonwealth of Australia (1901); Gallipoli (1915); White Australia policy (ended 1973); Mabo decision (1992); Sorry Day; multiculturalism."

- id: melanesia-history
