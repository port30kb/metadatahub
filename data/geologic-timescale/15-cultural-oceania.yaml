    sv: Melanesiska civilisationer
  description: "Oldest Pacific settlement; Papua New Guinea highlands agriculture (~7000 BCE); diverse cultures; Kuk Swamp; Lapita pottery tradition."

- id: sahul-settlement
  rank: CulturalAge
  parent: melanesia-history
  start: 50000
  end: 30000
  unit: BCE
  labels:
    en: Settlement of Sahul
    sv: Bosättningen av Sahul
  description: "First humans in New Guinea/Australia (connected as Sahul); maritime crossing from Sunda; earliest evidence of ocean voyaging by humans."

- id: png-highlands
  rank: CulturalAge
  parent: melanesia-history
