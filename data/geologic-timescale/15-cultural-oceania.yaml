    sv: Papua Nya Guineas höglandskultur
  description: "Diverse highland societies; 850+ languages; sweet potato revolution (~1600 CE); sing-sing gatherings; kina shell currency; first European contact 1930s."

- id: kuk-early-agriculture
  rank: CulturalAge
  parent: melanesia-history
