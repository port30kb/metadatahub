  start: 1523
  end: 1611
  unit: CE
  labels:
    en: Early Vasa Era
    sv: Äldre Vasatiden
  description: "Gustav Vasa breaks from Kalmar Union; Protestant Reformation; hereditary monarchy established; Stockholm Bloodbath aftermath."

- id: reformation-era
  rank: CulturalAge
