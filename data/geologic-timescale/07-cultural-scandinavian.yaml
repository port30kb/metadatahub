  description: "Scandinavian medieval period; Christianity dominant; Hanseatic trade; Gothic cathedrals; Black Death (1349)."

- id: early-medieval
  rank: CulturalAge
  parent: medieval-period
  start: 1050
  end: 1200
  unit: CE
  labels:
    en: Early Medieval Period
    sv: Tidig medeltid
  description: "Church consolidation; first Scandinavian dioceses; Romanesque architecture."

- id: high-medieval
  rank: CulturalAge
  parent: medieval-period
  start: 1200
  end: 1350
  unit: CE
  labels:
