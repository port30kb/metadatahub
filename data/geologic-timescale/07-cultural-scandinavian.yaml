  description: "Hanseatic League; Gothic architecture; Kalmar Union precursors; population growth."

- id: late-medieval
  rank: CulturalAge
  parent: medieval-period
  start: 1350
  end: 1520
  unit: CE
  labels:
    en: Late Medieval Period
    sv: Senmedeltiden
  description: "Black Death aftermath; Kalmar Union (1397); Reformation approaches."

- id: early-modern
  rank: CulturalAge
  parent: holocene
