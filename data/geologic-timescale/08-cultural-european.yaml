    de: Aufklärung
  description: "Reason, science, individual rights; Voltaire, Rousseau, Kant, Locke; influence on American and French Revolutions."

- id: age-of-revolutions
  rank: CulturalAge
  parent: holocene
  start: 1775
  end: 1848
  unit: CE
  labels:
    en: Age of Revolutions
    sv: Revolutionernas tid
  description: "American Revolution (1775), French Revolution (1789), Napoleonic Wars, Revolutions of 1848; end of ancien régime."

- id: romanticism
  rank: CulturalAge
  parent: modern-period
