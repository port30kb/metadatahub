    sv: Tidig medeltid
  description: "Fall of Western Rome (476); Merovingian and Carolingian kingdoms; spread of Christianity; feudalism develops."

- id: merovingian-period
  rank: CulturalAge
  parent: european-early-medieval
  start: 481
  end: 751
  unit: CE
  labels:
    en: Merovingian Period
    sv: Merovingertiden
  description: "Merovingian dynasty rules Frankish kingdoms; Clovis I converts to Christianity; foundation of medieval France."

- id: carolingian-period
  rank: CulturalAge
  parent: european-early-medieval
  start: 751
  end: 888
  unit: CE
  labels:
    en: Carolingian Period
    sv: Karolingiska perioden
    de: Karolingerzeit
  description: "Charlemagne crowned Emperor (800); Carolingian Renaissance; revival of learning, Latin scholarship, and arts."

- id: ottonian-period
  rank: CulturalAge
  parent: european-early-medieval
  start: 919
  end: 1024
  unit: CE
  labels:
    en: Ottonian Period
    sv: Ottonska perioden
  description: "Holy Roman Empire under Otto I; Ottonian Renaissance; expansion of Christianity into central Europe."

- id: european-high-medieval
  rank: CulturalAge
  parent: holocene
  start: 1000
  end: 1300
  unit: CE
  labels:
    en: High Middle Ages
    sv: Högmedeltiden
  description: "Crusades; Gothic cathedrals; universities founded (Bologna, Paris, Oxford); population growth; Magna Carta (1215)."

