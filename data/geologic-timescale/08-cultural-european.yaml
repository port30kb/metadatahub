- id: european-late-medieval
  rank: CulturalAge
  parent: holocene
  start: 1300
  end: 1500
  unit: CE
  labels:
    en: Late Middle Ages
    sv: Senmedeltiden
  description: "Black Death (1347-1351); Hundred Years' War; Great Western Schism; decline of feudalism; printing press (1440)."

- id: renaissance
  rank: CulturalAge
  parent: holocene
