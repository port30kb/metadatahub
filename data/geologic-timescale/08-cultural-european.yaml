  description: "European maritime exploration; Columbus (1492), Vasco da Gama (1498), Magellan (1519); colonial empires begin."

- id: european-reformation
  rank: CulturalAge
  parent: holocene
  start: 1517
  end: 1648
  unit: CE
  labels:
    en: European Reformation
    sv: Reformationen
  description: "Luther's 95 Theses (1517); Protestant churches emerge; Counter-Reformation; Wars of Religion; Peace of Westphalia (1648)."

- id: baroque-period
  rank: CulturalAge
  parent: holocene
  start: 1600
  end: 1750
  unit: CE
  labels:
    en: Baroque Period
    sv: Barocken
  description: "Dramatic, ornate art and architecture; Bernini, Caravaggio, Rubens, Bach, Vivaldi; absolutist monarchies."

- id: enlightenment
  rank: CulturalAge
  parent: holocene
  start: 1685
  end: 1815
  unit: CE
  labels:
    en: Age of Enlightenment
