# Broader European Historical Periods

- id: archaic-greece
  rank: CulturalAge
  parent: holocene
  start: 800
  end: 480
  unit: BCE
  labels:
    en: Archaic Greece
    sv: Arkaisk tid i Grekland
  description: "Rise of city-states (poleis); Greek colonization; development of the alphabet, Homer's epics, early philosophy."

- id: classical-greece
  rank: CulturalAge
  parent: holocene
  start: 480
  end: 323
  unit: BCE
  labels:
    en: Classical Greece
    sv: Klassisk tid i Grekland
  description: "Golden Age of Athens; Parthenon; Socrates, Plato, Aristotle; Athenian democracy; Peloponnesian War."

- id: hellenistic-period
  rank: CulturalAge
  parent: holocene
  start: 323
  end: 31
  unit: BCE
  labels:
    en: Hellenistic Period
    sv: Hellenistisk tid
  description: "Alexander the Great's empire fragments; spread of Greek culture across Mediterranean and Near East; Library of Alexandria."

- id: roman-republic
  rank: CulturalAge
  parent: holocene
  start: 509
  end: 27
  unit: BCE
  labels:
    en: Roman Republic
    sv: Romerska republiken
    de: Römische Republik
    el: Ρωμαϊκή Δημοκρατία
    la: Res Publica Romana
  description: "Roman expansion across Mediterranean; Punic Wars; Julius Caesar; transition to Empire."

- id: roman-empire
  rank: CulturalAge
  parent: holocene
  start: 27
  end: 476
  unit: CE
  labels:
    en: Roman Empire
    sv: Romerska riket
    de: Römisches Reich
    el: Ρωμαϊκή Αυτοκρατορία
    la: Imperium Romanum
    tr: Roma İmparatorluğu
  description: "Pax Romana; peak Roman civilization; roads, aqueducts, law; Christianity becomes state religion (380 CE)."

- id: late-antiquity
  rank: CulturalAge
  parent: holocene
  start: 250
  end: 750
  unit: CE
  labels:
    en: Late Antiquity
    sv: Senantiken
  description: "Transition from classical to medieval; fall of Western Rome (476); rise of Christianity; Byzantine Empire continues in East."

- id: hunnic-empire
  rank: CulturalAge
  parent: holocene
  start: 370
  end: 469
  unit: CE
  labels:
    en: Hunnic Empire
    sv: Hunniska riket
  description: "Nomadic steppe empire originating in Central Asia; swept west ~370 CE displacing Germanic peoples; Attila the Hun (434-453 CE) at peak; raided Balkans and Gaul; Battle of Catalaunian Plains (451 CE); dissolved rapidly after Attila's death (453 CE); possible relation to Xiongnu (匈奴) of Chinese records."

- id: byzantine-empire
  rank: CulturalAge
  parent: holocene
  start: 330
  end: 1453
  unit: CE
  labels:
    en: Byzantine Empire
    sv: Bysantinska riket
    el: Βυζαντινή Αυτοκρατορία
  description: "Eastern Roman Empire; Constantinople capital; Justinian's Code; Hagia Sophia; Greek culture; Orthodox Christianity; fell to Ottoman Turks (1453)."

- id: byzantine-early
  rank: CulturalAge
  parent: byzantine-empire
  start: 330
  end: 717
  unit: CE
  labels:
    en: Early Byzantine Period
    sv: Tidig bysantinsk period
  description: "Constantine founds Constantinople (330); Justinian I (527-565); Corpus Juris Civilis; Hagia Sophia (537); wars with Sasanian Persia; Arab sieges."

- id: byzantine-middle
  rank: CulturalAge
  parent: byzantine-empire
  start: 717
  end: 1204
  unit: CE
  labels:
    en: Middle Byzantine Period
    sv: Mellersta bysantinsk period
  description: "Iconoclasm controversy; Macedonian Renaissance; Great Schism (1054); Komnenian dynasty; Battle of Manzikert (1071); themes system."

- id: byzantine-late
  rank: CulturalAge
  parent: byzantine-empire
  start: 1204
  end: 1453
  unit: CE
  labels:
    en: Late Byzantine Period
    sv: Sen bysantinsk period
  description: "Fourth Crusade sacks Constantinople (1204); Latin Empire; Palaiologos restoration (1261); decline; Fall of Constantinople (1453) ends Roman continuity."

- id: european-early-medieval
  rank: CulturalAge
  parent: holocene
