    sv: Irokesförbundet
  description: "Originally Five Nations (Mohawk, Oneida, Onondaga, Cayuga, Seneca; Tuscarora joined 1722); Great Law of Peace; longhouse society; influenced U.S. Constitution debates."

- id: taino
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1200
  end: 1550
  unit: CE
  labels:
    en: Taíno Civilization
    sv: Taínocivilisationen
  description: "Caribbean (Hispaniola, Puerto Rico, Cuba, Jamaica); first indigenous people encountered by Columbus; cacique chiefs; ball courts; zemí worship; decimated by colonization."

- id: kalinago
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1200
  end: 1700
  unit: CE
  labels:
    en: Kalinago
    sv: Kalinago
  description: "Lesser Antilles (Dominica, St. Vincent, Grenada); skilled seafarers and warriors; resisted European colonization longest in Caribbean; cassava cultivation."

- id: saladoid
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 500
  end: 600
  unit: BCE-CE
  labels:
    en: Saladoid Culture
    sv: Saladoidkulturen
