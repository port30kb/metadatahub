    en: Gran Coclé Culture
    sv: "Gran Coclé-kulturen"
  description: "Central Panama; Sitio Conte gold and polychrome ceramics; elaborate burial goods; goldwork (huacas); bridge between Mesoamerican and South American traditions."

- id: diquis
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 700
  end: 1530
  unit: CE
  labels:
    en: Diquís Culture
    sv: Diquískulturen
  description: "Southern Costa Rica; stone spheres (Las Bolas, UNESCO); gold figurines; complex chiefdoms; connection to Chibchan cultural area."

- id: cherokee-nation
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1540
  end: 1838
  unit: CE
  labels:
    en: Cherokee Nation
    sv: Cherokeenationen
  description: "Southeast woodlands; one of 'Five Civilized Tribes'; Sequoyah's syllabary (1821); Cherokee Phoenix newspaper; Trail of Tears (1838)."

- id: north-america-colonial
  rank: CulturalAge
  parent: holocene
  start: 1492
  end: 1783
  unit: CE
  labels:
