  description: "French colonial empire; Cartier, Champlain; Quebec (1608), Montreal (1642); fur trade; coureurs des bois; alliance with Huron-Wendat; ceded to Britain 1763."

- id: new-spain-north
  rank: CulturalAge
  parent: north-america-colonial
  start: 1521
  end: 1821
  unit: CE
  labels:
    en: New Spain
