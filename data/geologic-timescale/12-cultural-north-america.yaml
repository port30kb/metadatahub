    sv: Spansk utforskning av Nordamerika
  description: "Columbus (1492); Ponce de León in Florida (1513); Coronado explores Southwest (1540); de Soto crosses Southeast; St. Augustine founded (1565)."

- id: new-france
  rank: CulturalAge
