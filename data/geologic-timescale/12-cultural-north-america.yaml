# North American Historical & Cultural Periods

- id: north-america-precolumbian
  rank: CulturalAge
  parent: holocene
  start: 15000
  end: 1492
  unit: BCE-CE
  labels:
    en: "Pre-Columbian North America"
    sv: Förkolumbisk Nordamerika
  description: "Indigenous civilizations of North America before European contact; from Clovis hunters to complex societies of Mesoamerica and the Southwest."

- id: monte-verde
  rank: CulturalAge
  parent: south-america-precolumbian
  start: 14800
  end: 13800
  unit: BCE
  labels:
    en: Monte Verde
    sv: Monte Verde
  description: "Southern Chile; pre-Clovis archaeological site; evidence of human habitation ~14,800 BCE; challenges Clovis-first model; seaweed, mastodon remains; Tom Dillehay excavations."

- id: paleo-indians
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 15000
  end: 8000
  unit: BCE
  labels:
    en: "Paleo-Indian Period"
    sv: Paleoindian period
  description: "First peoples of the Americas; Clovis culture (~13,000 BP); mammoth and megafauna hunters; Folsom points; Beringia land bridge migration."

- id: clovis-culture
  rank: CulturalAge
  parent: paleo-indians
  start: 11050
  end: 10750
  unit: BCE
  labels:
    en: Clovis Culture
    sv: Cloviskulturen
  description: "Distinctive fluted projectile points; widespread across North America; associated with Pleistocene megafauna hunting; Blackwater Draw type site."

- id: folsom-culture
  rank: CulturalAge
  parent: paleo-indians
  start: 10800
  end: 10200
  unit: BCE
  labels:
    en: Folsom Culture
    sv: Folsomkulturen
  description: "Post-Clovis bison hunters on Great Plains; refined fluted points; Folsom, New Mexico type site; megafauna extinction."

- id: na-archaic-period
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 8000
  end: 1000
  unit: BCE
  labels:
    en: Archaic Period
    sv: Archaicperioden
  description: "Post-megafauna adaptation; diversified subsistence; ground stone tools; regional traditions develop across the continent."

- id: na-archaic-early
  rank: CulturalAge
  parent: na-archaic-period
  start: 8000
  end: 5000
  unit: BCE
  labels:
    en: Early Archaic
    sv: Tidig arkaisk period
  description: "Adaptation to Holocene environments; Dalton and Kirk point traditions; increasing plant use; seasonal rounds."

- id: na-archaic-middle
  rank: CulturalAge
  parent: na-archaic-period
  start: 5000
  end: 3000
  unit: BCE
  labels:
    en: Middle Archaic
    sv: Mellanarkaisk period
  description: "Population growth; specialized tool kits; long-distance exchange networks begin; Poverty Point site (Louisiana)."

- id: na-archaic-late
  rank: CulturalAge
  parent: na-archaic-period
  start: 3000
  end: 1000
  unit: BCE
  labels:
    en: Late Archaic
    sv: Senarkaisk period
  description: "First pottery in Southeast; mound building begins; Poverty Point earthworks; early squash cultivation; copper tools in Great Lakes."

- id: poverty-point
  rank: CulturalAge
  parent: na-archaic-late
  start: 1700
  end: 1100
  unit: BCE
  labels:
    en: Poverty Point Culture
    sv: "Poverty Point-kulturen"
  description: "Massive earthwork complex in Louisiana; concentric ridges, Mound A (largest in North America at the time); long-distance trade network."

- id: mesoamerica
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 2000
  end: 1521
  unit: BCE-CE
  labels:
    en: Mesoamerican Civilizations
    sv: Mesoamerikanska civilisationer
  description: "Complex civilizations of Mexico and Central America; writing, calendars, monumental architecture, agriculture (maize, beans, squash)."

- id: olmec
  rank: CulturalAge
  parent: mesoamerica
  start: 1500
  end: 400
  unit: BCE
  labels:
    en: Olmec Civilization
    sv: Olmekisk civilisation
    nah: Ōlmēcah
  description: "Mother culture of Mesoamerica; colossal stone heads; San Lorenzo and La Venta; first Mesoamerican writing and calendar; rubber ball game."

- id: zapotec
  rank: CulturalAge
  parent: mesoamerica
  start: 700
  end: 1521
  unit: BCE-CE
  labels:
    en: Zapotec Civilization
    sv: Zapotekisk civilisation
    zap: Binnizá
  description: "Oaxaca Valley, Mexico; Monte Albán capital; earliest Mesoamerican writing system; 2,500-year continuous culture."

- id: teotihuacan
  rank: CulturalAge
  parent: mesoamerica
  start: 100
  end: 750
  unit: CE
  labels:
    en: Teotihuacán
    sv: Teotihuacán
    nah: Teōtīhuacān
  description: "Largest city in pre-Columbian Americas (~125,000 people); Pyramids of the Sun and Moon; Avenue of the Dead; major fire ~550 CE; final abandonment ~750 CE."

- id: maya-classic
  rank: CulturalAge
  parent: mesoamerica
  start: 250
  end: 900
  unit: CE
  labels:
    en: Classic Maya Civilization
    sv: Klassisk mayacivilisation
    yua: Maaya
  description: "City-states across Yucatán, Guatemala, Belize; hieroglyphic writing; Long Count calendar; Tikal, Palenque, Copán; mysterious collapse ~900 CE."

- id: maya-preclassic
  rank: CulturalAge
  parent: mesoamerica
  start: 2000
  end: 250
  unit: BCE-CE
  labels:
    en: Preclassic Maya
    sv: Maya
  description: "Origins of Maya civilization; El Mirador massive pyramids; development of writing and calendar; early agriculture and village life."

- id: maya-postclassic
  rank: CulturalAge
  parent: mesoamerica
  start: 900
  end: 1521
  unit: CE
  labels:
    en: Postclassic Maya
    sv: Maya
  description: "After Classic collapse; Chichén Itzá, Mayapán, K'iche' kingdoms; Kukulkán/Quetzalcoatl cult; Spanish conquest of Yucatán."

- id: toltec
  rank: CulturalAge
  parent: mesoamerica
  start: 900
  end: 1168
  unit: CE
  labels:
    en: Toltec Empire
    sv: Toltecriket
  description: "Tula as capital; warrior culture; Quetzalcoatl legend; influence on Aztec ideology; feathered serpent imagery."

- id: aztec-empire
  rank: CulturalAge
  parent: mesoamerica
  start: 1428
  end: 1521
  unit: CE
  labels:
    en: Aztec Empire / Triple Alliance
    sv: Aztekiska riket
    nah: Ēxcān Tlahtōlōyān
  description: "Tenochtitlán on Lake Texcoco (~200,000 people); Mexica Triple Alliance; human sacrifice; chinampas; conquered by Cortés 1521."

- id: aztec-rise
  rank: CulturalAge
  parent: mesoamerica
  start: 1325
  end: 1428
  unit: CE
  labels:
    en: Rise of the Aztecs
    sv: Aztekernas framväxt
  description: "Founding of Tenochtitlán (1325); Mexica as mercenaries and vassals; Triple Alliance formed with Texcoco and Tlacopan (1428)."

- id: aztec-expansion
  rank: CulturalAge
  parent: aztec-empire
  start: 1428
  end: 1502
  unit: CE
  labels:
    en: Aztec Imperial Expansion
    sv: Aztekiska rikets expansion
  description: "Itzcoatl, Moctezuma I, Ahuitzotl expand empire from Gulf to Pacific; flower wars; tribute system; Great Temple of Tenochtitlán."

- id: aztec-moctezuma-ii
  rank: CulturalAge
  parent: aztec-empire
  start: 1502
  end: 1520
  unit: CE
  labels:
    en: Reign of Moctezuma II
    sv: "Moctezuma II:s regeringstid"
  description: "Empire at greatest extent; omens and prophecies; arrival of Cortés (1519); Moctezuma captured; dies during La Noche Triste (1520)."

- id: mixtec
  rank: CulturalAge
  parent: mesoamerica
  start: 900
  end: 1521
  unit: CE
  labels:
    en: Mixtec Civilization
    sv: Mixteccivilisationen
  description: "Oaxaca highlands; codex tradition (only pre-Columbian books to survive); Lord Eight Deer; goldsmithing; competed with Zapotec and Aztec."

- id: purepecha
  rank: CulturalAge
  parent: mesoamerica
  start: 1300
  end: 1530
  unit: CE
  labels:
    en: Purépecha (Tarascan) Empire
    sv: "Purépecha-riket"
  description: "Western Mexico (Michoacán); never conquered by Aztecs; Tzintzuntzan capital; metalworking (copper, bronze); yácatas stepped pyramids."

- id: totonac
  rank: CulturalAge
  parent: mesoamerica
  start: 300
  end: 1521
  unit: CE
  labels:
    en: Totonac Civilization
    sv: Totonaccivilisationen
  description: "Veracruz Gulf coast; El Tajín with Pyramid of the Niches; Cempoala; allies of Cortés against Aztecs; voladores ceremony."

- id: epi-olmec
  rank: CulturalAge
  parent: mesoamerica
  start: 300
  end: 250
  unit: BCE-CE
  labels:
    en: "Epi-Olmec Culture"
    sv: Epiolmekisk kultur
  description: "Successor to Olmec in Veracruz; Tres Zapotes; La Mojarra stela with Long Count date; transitional between Olmec and Classic cultures."

- id: woodland-period
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1000
  end: 1000
  unit: BCE-CE
  labels:
    en: Woodland Period
    sv: Woodlandperioden
  description: "Eastern North America; introduction of pottery, mound building, and incipient agriculture; Adena and Hopewell traditions."

- id: adena-culture
  rank: CulturalAge
  parent: woodland-period
  start: 800
  end: 100
  unit: BCE
  labels:
    en: Adena Culture
    sv: Adenakulturen
  description: "Ohio Valley mound builders; conical burial mounds; Adena pipe; early cultivation of sunflower, squash; long-distance trade."

- id: hopewell-tradition
  rank: CulturalAge
  parent: woodland-period
  start: 100
  end: 500
  unit: CE
  labels:
    en: Hopewell Tradition
    sv: Hopewelltraditionen
  description: "Middle Woodland; elaborate burial mounds and earthworks; Hopewell Interaction Sphere; obsidian, copper, shells traded across continent."

- id: mississippian-culture
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 800
  end: 1600
  unit: CE
  labels:
    en: Mississippian Culture
    sv: Mississippiankulturen
  description: "Complex chiefdoms across Southeast and Midwest; platform mounds; maize agriculture; Cahokia as largest city north of Mexico."

- id: cahokia
  rank: CulturalAge
  parent: mississippian-culture
  start: 1050
  end: 1350
  unit: CE
  labels:
    en: Cahokia
    sv: Cahokia
  description: "Largest pre-Columbian city north of Mexico (~20,000 people); Monks Mound (largest earthwork in Americas); Woodhenge; UNESCO World Heritage Site."

- id: fort-ancient
  rank: CulturalAge
  parent: mississippian-culture
  start: 1000
  end: 1650
  unit: CE
  labels:
    en: Fort Ancient Culture
    sv: "Fort Ancient-kulturen"
  description: "Ohio Valley; maize-based agriculture; circular villages; Serpent Mound (Great Serpent Mound); distinct from Mississippian but contemporaneous."

- id: plaquemine
  rank: CulturalAge
  parent: mississippian-culture
  start: 1200
  end: 1700
  unit: CE
  labels:
    en: Plaquemine Culture
    sv: Plaqueminekulturen
  description: "Lower Mississippi Valley; platform mounds; evolved from Coles Creek; Winterville, Lake George sites; ancestral to Natchez."

- id: ancestral-pueblo
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 100
  end: 1600
  unit: CE
  labels:
    en: Ancestral Puebloans
    sv: Pueblofolkets förfäder
  description: "Four Corners region; cliff dwellings (Mesa Verde); Chaco Canyon great houses; kiva ceremonial architecture; maize, beans, squash agriculture."

- id: chaco-canyon
  rank: CulturalAge
  parent: ancestral-pueblo
  start: 850
  end: 1150
  unit: CE
  labels:
    en: Chaco Canyon Florescence
    sv: Chaco Canyons blomstringsperiod
  description: "Chaco Culture; great houses (Pueblo Bonito); road network; astronomical alignments; regional trade center; UNESCO World Heritage Site."

- id: hohokam
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 300
  end: 1450
  unit: CE
  labels:
    en: Hohokam Culture
    sv: Hohokamkulturen
  description: "Southern Arizona; extensive canal irrigation (over 1,000 km); Snaketown; ball courts; Mesoamerican trade connections; ancestors of O'odham."

- id: mogollon
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 200
  end: 1450
  unit: CE
  labels:
    en: Mogollon Culture
    sv: Mogollonkulturen
  description: "Southwestern mountains (Arizona, New Mexico, Chihuahua); pithouses to pueblos; Mimbres pottery with distinctive black-on-white designs."

- id: northwest-coast
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 3000
  end: 1774
  unit: BCE-CE
  labels:
    en: Northwest Coast Cultures
    sv: Nordvästkustens kulturer
  description: "Pacific Northwest; Haida, Tlingit, Kwakwaka'wakw; cedar plank houses, totem poles, potlatch ceremonies; salmon-based economy; complex non-agricultural society."

- id: thule-culture
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 200
  end: 1600
  unit: CE
  labels:
    en: Thule Culture
    sv: Thulekulturen
  description: "Arctic whale hunters; ancestors of modern Inuit; spread from Alaska across Canadian Arctic to Greenland; dog sleds, kayaks, umiaks."

- id: dorset-culture
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 500
  end: 1500
  unit: BCE-CE
  labels:
    en: Dorset Culture
    sv: Dorsetkulturen
  description: "Paleo-Eskimo Arctic culture; replaced by Thule people; soapstone lamps, snow houses; miniature ivory carvings; no dog sleds or bows."

- id: plains-village
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1000
  end: 1780
  unit: CE
  labels:
    en: Plains Village Period
    sv: Slättlandsbyperioden
  description: "Semi-sedentary farming communities on Great Plains; earth lodge villages; maize agriculture; Mandan, Hidatsa, Arikara, Pawnee, Wichita."

- id: iroquois-confederacy
  rank: CulturalAge
  parent: north-america-precolumbian
  start: 1450
  end: 1776
  unit: CE
