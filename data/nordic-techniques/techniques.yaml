# Nordic Techniques Vocabulary
# ============================
# SKOS-style hierarchical vocabulary of techniques used in Nordic museum cataloguing.
# Covers metalworking, textiles, woodworking, ceramics, stone, painting,
# printmaking, glass, leather/fiber, and Sami/Nordic-specific crafts.
#
# Sources:
#   Getty Art & Architecture Thesaurus (AAT)
#     http://www.getty.edu/research/tools/vocabularies/aat/
#   Wikipedia: various technique articles
#   Nordic museum cataloguing traditions

# ══════════════════════════════════════════════════════════════
