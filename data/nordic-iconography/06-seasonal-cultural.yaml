    sv: Jul
    fi: Joulu
    da: Jul
    nb: Jul
    is: Jól
  description: "Nordic Christmas traditions blending Christian observance with pre-Christian Yule customs, depicted through scenes of celebrations, decorations, and seasonal activities."

- id: valborg
