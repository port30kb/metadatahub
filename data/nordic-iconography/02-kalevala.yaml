  labels:
    en: Kalevala characters
    sv: Kalevala-gestalter
    fi: Kalevalan hahmot
    da: Kalevala-figurer
    nb: Kalevala-figurer
  description: "Characters from the Finnish national epic Kalevala, compiled by Elias Lönnrot from Finnish and Karelian oral folklore and first published in 1835."

- id: kalevala-concepts
  labels:
    en: Kalevala concepts and objects
    sv: Kalevala-föremål och begrepp
