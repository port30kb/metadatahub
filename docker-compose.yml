version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hugo-site
      - oxigraph
      - trifid
      - oai-pmh
    networks:
      - web

  hugo-site:
    image: nginx:1-alpine
    restart: unless-stopped
    volumes:
      - ./hugo/public:/usr/share/nginx/html:ro
      - ./hugo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - web

  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:latest
    restart: unless-stopped
    volumes:
      - oxigraph_data:/data
    expose:
      - "7878"
    command: serve --location /data --bind 0.0.0.0:7878
    networks:
      - web

  trifid:
    image: ghcr.io/zazuko/trifid:latest
    restart: unless-stopped
    volumes:
      - ./trifid/config.yaml:/app/config.yaml:ro
    expose:
      - "8080"
    environment:
      - SPARQL_ENDPOINT_URL=http://oxigraph:7878/query
      - SPARQL_UPDATE_URL=http://oxigraph:7878/update
    depends_on:
      - oxigraph
    networks:
      - web

  oai-pmh:
    build:
      context: ./oai-pmh
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./oai-pmh/data:/var/www/data:ro
    expose:
      - "80"
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:
  oxigraph_data:

networks:
  web:
    driver: bridge
