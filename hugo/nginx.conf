server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content negotiation for static RDF files
    # Caddy handles primary routing; this is a fallback for direct access.
    # Matches a vocabulary/dataset resource (e.g. /vocab/cidoc-crm/) and
    # advertises its alternate RDF representations via Link headers.
    location ~ ^/(?<section>vocab|dataset)/(?<slug>[^/]+)/?$ {
        # Try exact path, then directory index
        try_files $uri $uri/ =404;

        # Add Link headers for alternate representations of this resource
        add_header Link '</${section}/${slug}/index.ttl>; rel="alternate"; type="text/turtle"' always;
        add_header Link '</${section}/${slug}/index.jsonld>; rel="alternate"; type="application/ld+json"' always;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Cache RDF files
    location ~* \.(ttl|jsonld|rdf)$ {
        expires 1d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }
}
